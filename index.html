<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Subject Marks Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Student Result Calculator</h2>
        <div class="input-group">
            <label>Enter Number of Subjects:</label>
            <input type="number" id="subjectCount" min="1" placeholder="e.g. 5">
            <button onclick="generateInputs()">Enter Marks</button>
        </div>

        <div id="marksInputArea"></div>
        <div id="resultDisplay"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
